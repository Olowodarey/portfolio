    - generic [ref=f8e199]:
      - heading "Who can join SaveCircle?" [level=2] [ref=f8e200]
      - generic [ref=f8e201]:
        - generic [ref=f8e202]:
          - heading "Traders and Crypto Enthusiasts" [level=3] [ref=f8e203]
          - paragraph [ref=f8e204]: Dedication and maintaining of initial capital as well as gathering of funds to actually fund trading accounts or keep a backup capital is always a stretch in the trading world. We are dedicated to helping you accumulate your profits over a period of time and for as long as you wish, so as to be able to bounce bank into the system when it becomes necessary to add more... Every traders dream is to monitor and be able to replenish (fund) his/her trading accounts when need arises, we at SaveCircle is dedicated into holding you accountable for Taking charts to new heights.
        - generic [ref=f8e205]:
          - heading "Students and Young Professionals" [level=3] [ref=f8e206]
          - paragraph [ref=f8e207]: This schooling and working system prove tedious and harsher daily as requirements to pay bills and meet up with certain demands such as monthly transportation, feeding, rents, and even departmental and school activities. Our SaveCircle system helps in securing such harsh realities and turning them into a Support system where by each individual can join a pool anticipating the time of their payment in the offline sectors and end up meeting up with all the demands at ease and at the right pace. SaveCircle turns imagination into hand stretched reality.
        - generic [ref=f8e208]:
          - heading "Business persons and Long term planners" [level=3] [ref=f8e209]
          - paragraph [ref=f8e210]: What separates the rich from the poor isn't opportunities, it's pure capital and liquidity. In SaveCircle we turn lost of opportunities and imagination into serendipity, a combination of events which have come together by chance to make a surprisingly good or wonderful outcome. We'd build up those committed activities and contributive acts into a strong support system where you can finally meet up with your goals.
        - generic [ref=f8e211]:
          - heading "Community" [level=3] [ref=f8e212]
          - paragraph [ref=f8e213]: Communities and close associate could decide to raise funds by coming together to achieve a result over an environmental assessment or fundraising to sort out certain issues. With SaveCircle, that can be easily achieved by setting up a limit and a time frame to help in spreading out and accumulating the required funds to cover up the process. Just out here touching grass nd recharging the community vaults.
        - generic [ref=f8e214]:
          - heading "Family and Friends" [level=3] [ref=f8e215]
          - paragraph [ref=f8e216]: Illuminating ideas, bond and inspiration. In this regards close associates and families can set-up a pool and pitch in funds to plan an event, marriage, trip etc. with no fear of how payments can be made cause the accumulated funds can be used to setup any of those process and pay off any credit during those process. It unifies family and Friends ties while making payments easier and reliable coming as peace after the storm.
        - generic [ref=f8e217]:
          - heading "Others" [level=3] [ref=f8e218]
          - paragraph [ref=f8e219]: SaveCircle isn't limited to anyone to be honest was supposed to place this line at the top but placing it here still seems perfect. No age limitation or any other restrictions cause at SaveCircle we are a DAO and our community has the right in voting and implementing actions under the ecosystem. Our goal is to see everybody rise above ranks and win at every single step of the way.
