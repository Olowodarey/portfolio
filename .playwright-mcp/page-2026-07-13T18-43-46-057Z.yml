      - heading "Save Together Thrive Together" [level=1] [ref=f8e25]
      - paragraph [ref=f8e26]: Welcome to SaveCircle, a community driven integration where needs and demands meets smart contributive savings. Earn an extension of accumulated returns cancelling the daily interest and charges posed by traditional banking system while maintaining control, flexibility and a feasible planning system over your funds. Our rotating savings model ensures adequate and accurate payout.
