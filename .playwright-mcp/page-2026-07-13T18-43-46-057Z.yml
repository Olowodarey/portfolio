    - generic [ref=f8e31]:
      - generic [ref=f8e33]:
        - heading "The SaveCircle difference" [level=2] [ref=f8e34]
        - paragraph [ref=f8e36]: Most DeFi platforms return exactly what you locked. With SaveCircle, you get to choose an initial lock amount to join a group best suited for your contribution plan and get a priority payout based on the total number of people present in the group, the specified amount is saved either on a daily, weekly or monthly schedule based on the group plan subscribed to. Through rotating payouts, everyone takes a turn receiving requested contributions from other members while the rest members continue with the savings. At the end of the cycle, you get back your lock amount plus all your contributions. It's a smarter way to save together and access funds sooner enabling individuals to sort out pressing demands.
        - generic [ref=f8e37]: Pay with STRK, ETH, USDT, or USDC. We auto‑swap to USDC.
      - generic [ref=f8e40]:
        - generic [ref=f8e41]:
          - paragraph [ref=f8e42]: Priority by lock
          - paragraph [ref=f8e43]: First come, first paid using the reputation level to judge the scheduled payout system.
        - generic [ref=f8e44]:
          - paragraph [ref=f8e45]: Rotating payouts
          - paragraph [ref=f8e46]: Everyone gets a turn as long as they keep up in avoiding defaulting and penalties.
        - generic [ref=f8e47]:
          - paragraph [ref=f8e48]: You get everything back
          - paragraph [ref=f8e49]: Locked + contributed amounts are returned to individuals after completing the circle.
